<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d2733">
  <title>Ararat – Karten</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Einstellungs-Icon in der Ecke (Menü kommt in Phase 5) -->
  <button id="btnEinstellungen" class="einstellungen" type="button" aria-label="Einstellungen">
    <svg viewBox="0 0 24 24" aria-hidden="true">

    <div class="spinner" aria-hidden="true"></div>
  </div>

  <!-- Stapel-Ansicht: vier Bereichskarten von oben -->
  <main id="stapel" class="stapel" hidden></main>

  <script src="app.js"></script>
</body>
</html>
