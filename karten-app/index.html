<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d2733">
  <title>Ararat – Karten</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Einstellungs-Icon in der Ecke (Menü kommt in Phase 5) -->
  <button id="btnEinstellungen" class="einstellungen" type="button" aria-label="Einstellungen">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Zm9 3.5a7.5 7.5 0 0 0-.1-1.2l2-1.6-2-3.4-2.4 1a7.6 7.6 0 0 0-2-1.2l-.4-2.6H9.9l-.4 2.6a7.6 7.6 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.6a7.6 7.6 0 0 0 0 2.4l-2 1.6 2 3.4 2.4-1a7.6 7.6 0 0 0 2 1.2l.4 2.6h4.2l.4-2.6a7.6 7.6 0 0 0 2-1.2l2.4 1 2-3.4-2-1.6c.06-.4.1-.8.1-1.2Z"/>
    </svg>
  </button>

  <!-- Lade- / Fehlerstatus (bei Erfolg durch den Stapel ersetzt) -->
  <div id="status" class="status" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
  </div>

  <!-- Stapel-Ansicht: vier Bereichskarten von oben -->
  <main id="stapel" class="stapel" hidden></main>

  <!-- Geöffnete Karte (Vollbild) -->
  <div id="detail" class="detail" hidden role="dialog" aria-modal="true" aria-label="Gezogene Karte">
    <button id="btnSchliessen" class="schliessen" type="button" aria-label="Karte schließen">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6 L18 18 M18 6 L6 18"/></svg>
    </button>
    <div id="detailInhalt" class="detail-inhalt"></div>
    <div id="effekt" class="effekt" aria-hidden="true" hidden></div>
    <button id="btnWiederhol" class="wiederhol" type="button" aria-label="Audio wiederholen" hidden>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
    </button>
  </div>

  <!-- Einstellungs-Panel (Phase 5) -->
  <div id="einstellungenOverlay" class="ueberzug" hidden></div>
  <div id="einstellungenPanel" class="panel" hidden role="dialog" aria-modal="true" aria-label="Einstellungen">
    <div class="panel-griff" aria-hidden="true"></div>
    <div class="panel-kopf">
      <h2 class="panel-titel">Einstellungen</h2>
      <button id="btnEinstellungenZu" class="panel-zu" type="button" aria-label="Einstellungen schließen">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6 L18 18 M18 6 L6 18"/></svg>
      </button>
    </div>

    <section class="feld">
      <span class="feld-titel">Angezeigte Sprache</span>
      <div id="wahlTextsprache" class="segment" role="group" aria-label="Angezeigte Sprache"></div>
    </section>

    <section class="feld">
      <span class="feld-titel">Audiosprache</span>
      <div id="wahlAudiosprache" class="segment" role="group" aria-label="Audiosprache"></div>
    </section>

    <section class="feld feld-schalter">
      <label class="schalter-zeile" for="schalterAudio">
        <span class="feld-titel">Audio abspielen</span>
        <button id="schalterAudio" class="schalter" type="button" role="switch" aria-checked="true" aria-label="Audio abspielen"></button>
      </label>
    </section>

    <section class="feld feld-schalter">
      <label class="schalter-zeile" for="schalterEffekt">
        <span class="feld-titel">Effekt-Anzeige in der Ecke</span>
        <button id="schalterEffekt" class="schalter" type="button" role="switch" aria-checked="true" aria-label="Effekt-Anzeige in der Ecke"></button>
      </label>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
